<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe Mensual de Obras</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #006854;
            --primary-light: #00A887;
            --accent: #4BFFDD;
            --accent-light: #D9FFF8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --gray-highlight: #e5e7eb;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --card-shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            min-height: 100vh;
            padding: 1.5rem 1rem;
            color: var(--text-dark);
        }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .login-box {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            max-width: 450px;
            width: 90%;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo img {
            max-width: 250px;
            height: auto;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-subtitle {
            font-size: 1rem;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 168, 135, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Manrope', sans-serif;
        }

        .login-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 104, 84, 0.3);
        }

        .login-error {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-align: center;
            display: none;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: none;
        }

        .container.authenticated {
            display: block;
        }

        .header {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.1;
        }

        .header-content {
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .header-logo {
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .header-logo img {
            max-width: 280px;
            height: auto;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.05rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .period-selector {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .period-btn {
            padding: 0.75rem 1.5rem;
            background: var(--bg-light);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Manrope', sans-serif;
        }

        .period-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .period-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(10, 37, 64, 0.3);
        }

        .two-col-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .two-col-metrics {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .header-logo {
                margin-top: 1.5rem;
            }
        }

        .metric-card {
            background: white;
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow-hover);
        }

        .metric-label {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .metric-value {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .metric-change {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .metric-change.positive {
            color: var(--success);
        }

        .metric-change.negative {
            color: var(--danger);
        }

        .metric-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .metric-status {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
        }

        .metric-vs-text {
            font-size: 0.75rem;
            color: var(--text-light);
            font-weight: 500;
            text-align: right;
        }

        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
            position: relative;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .chart-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .chart-subtitle {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .chart-legend-note {
            font-size: 0.8rem;
            color: var(--text-light);
            font-style: italic;
            margin-top: 0.5rem;
        }

        .chart-note {
            font-size: 0.8rem;
            color: var(--text-light);
            font-style: italic;
            margin-top: 1rem;
            text-align: center;
        }

        .historical-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            display: none;
            z-index: 100;
        }

        .historical-overlay.active {
            display: block;
        }

        .historical-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 101;
        }

        .historical-close:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        .table-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            margin-bottom: 2rem;
            position: relative;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .data-table thead th {
            background: var(--primary);
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .data-table thead th:first-child {
            border-radius: 12px 0 0 0;
            text-align: left;
        }

        .data-table thead th:last-child {
            border-radius: 0 12px 0 0;
        }

        .data-table tbody tr {
            transition: all 0.2s ease;
        }

        .data-table tbody tr:hover {
            background: var(--bg-light);
        }

        .data-table tbody td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            text-align: center;
        }

        .data-table tbody td:first-child {
            text-align: left;
        }

        .data-table tbody tr:last-child td:first-child {
            border-radius: 0 0 0 12px;
        }

        .data-table tbody tr:last-child td:last-child {
            border-radius: 0 0 12px 0;
        }

        .obra-name {
            font-weight: 700;
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .numeric-cell {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .highlighted-col {
            background-color: var(--accent-light) !important;
        }

        .gray-highlight-col {
            background-color: var(--gray-highlight) !important;
        }

        .merged-cell {
            background-color: var(--bg-light) !important;
        }

        .clickable-coef {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .clickable-coef:hover {
            background-color: var(--primary) !important;
            color: white;
            transform: scale(1.05);
        }

        .coef-hint {
            font-size: 0.75rem;
            color: var(--text-light);
            font-style: italic;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .badge {
            display: inline-block;
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge.success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .badge.warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .badge.danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .footer-note {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 2rem;
            box-shadow: var(--card-shadow);
            border-left: 4px solid var(--accent);
        }

        .footer-note p {
            color: var(--text-light);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .legend-box {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 1.25rem;
            margin-top: 1.5rem;
        }

        .legend-item {
            display: flex;
            align-items: start;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .legend-text {
            font-size: 0.875rem;
            color: var(--text-dark);
            line-height: 1.5;
        }

        .legend-title {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animated {
            animation: fadeIn 0.6s ease-out;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.25rem;
        }

        .change-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .projection-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
            text-align: center;
        }

        .projection-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .projection-total {
            background: var(--accent-light);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .projection-total-label {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .projection-total-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

        function formatCurrency(value, isUSD = false) {
            if (value === null || value === undefined) return '-';
            const currency = isUSD ? 'USD' : 'ARS';
            return new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: currency,
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }

        function formatPercent(value) {
            if (value === null || value === undefined) return '-';
            return (value * 100).toFixed(1) + '%';
        }

        function formatNumber(value, decimals = 2) {
            if (value === null || value === undefined) return '-';
            return value.toFixed(decimals);
        }

        function getStatusBadge(desvio) {
            if (desvio === null || desvio === undefined) return '';
            if (desvio > 0.05) return '<span class="badge success">Desempeño Superior</span>';
            if (desvio < -0.05) return '<span class="badge danger">Déficit de Avance</span>';
            return '<span class="badge warning">Conforme al Plan</span>';
        }

        function calcularPromedio(valores) {
            const valoresValidos = valores.filter(v => v !== null && v !== undefined && !isNaN(v) && v > 0);
            if (valoresValidos.length === 0) return 0;
            return valoresValidos.reduce((a, b) => a + b, 0) / valoresValidos.length;
        }

        function calcularPromedioObra(q1, q2) {
            if (q2 === null || q2 === undefined) return q1;
            const valores = [q1, q2].filter(v => v > 0);
            return calcularPromedio(valores);
        }

        function getChangeIndicator(current, previous, isInverted = false) {
            if (!previous || previous === 0) return '';
            const change = ((current - previous) / previous) * 100;
            const absChange = Math.abs(change);
            const isPositive = isInverted ? change < 0 : change > 0;
            const arrow = change > 0 ? '↑' : '↓';
            const colorClass = isPositive ? 'positive' : 'negative';
            
            return `<span class="change-indicator ${colorClass}">${arrow} ${absChange.toFixed(1)}%</span>`;
        }

        function getPerformanceStatus(value, type) {
            if (type === 'martella') {
                if (value > 1) return 'Sobre especializado';
                if (value < 0.95) return 'Sub especializado';
                return 'Óptimo';
            } else {
                if (value > 1) return 'Rendimiento superior';
                return 'Bajo rendimiento';
            }
        }

                                    family: 'JetBrains Mono'
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                font: {
                                    family: 'JetBrains Mono',
                                    size: 10
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderCertifChart(data) {
            const ctx = document.getElementById('certifChart');
            
            if (certifChart) {
                certifChart.destroy();
            }

            const obrasFiltradas = data.certif.obras.filter((_, i) => data.certif.certifReal[i] > 0);
            const valoresFiltrados = data.certif.certifReal.filter(v => v > 0);
            const total = valoresFiltrados.reduce((a, b) => a + b, 0);

            certifChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: obrasFiltradas,
                    datasets: [{
                        data: valoresFiltrados,
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.85)',
                            'rgba(118, 75, 162, 0.85)',
                            'rgba(16, 185, 129, 0.85)',
                            'rgba(245, 158, 11, 0.85)',
                            'rgba(239, 68, 68, 0.85)',
                            'rgba(59, 130, 246, 0.85)',
                            'rgba(168, 85, 247, 0.85)',
                            'rgba(236, 72, 153, 0.85)'
                        ],
                        borderWidth: 3,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            padding: 12,
                            titleFont: {
                                size: 14,
                                weight: '700',
                                family: 'Manrope'
                            },
                            bodyFont: {
                                size: 12,
                                family: 'JetBrains Mono'
                            },
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.parsed;
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return `${label}: ${formatCurrency(value)} (${percentage}%)`;
                                }
                            }
                        },
                        datalabels: {
                            formatter: function(value, context) {
                                const percentage = ((value / total) * 100);
                                const label = context.chart.data.labels[context.dataIndex];
                                
                                if (percentage < 8) {
                                    return '';
                                }
                                return `${percentage.toFixed(1)}%\n${label}`;
                            },
                            color: '#ffffff',
                            font: {
                                weight: 'bold',
                                size: 11,
                                family: 'JetBrains Mono'
                            },
                            textAlign: 'center',
                            anchor: 'center',
                            align: 'center'
                        }
                    }
                },
                plugins: [{
                    afterDatasetsDraw: function(chart) {
                        const ctx = chart.ctx;
                        const dataset = chart.data.datasets[0];
                        const meta = chart.getDatasetMeta(0);
                        
                        meta.data.forEach((arc, index) => {
                            const value = dataset.data[index];
                            const percentage = ((value / total) * 100);
                            
                            if (percentage < 8) {
                                const label = chart.data.labels[index];
                                const angle = (arc.startAngle + arc.endAngle) / 2;
                                const radius = arc.outerRadius + 40;
                                
                                const x = arc.x + Math.cos(angle) * radius;
                                const y = arc.y + Math.sin(angle) * radius;
                                
                                const lineStartX = arc.x + Math.cos(angle) * (arc.outerRadius + 5);
                                const lineStartY = arc.y + Math.sin(angle) * (arc.outerRadius + 5);
                                const lineEndX = arc.x + Math.cos(angle) * (arc.outerRadius + 30);
                                const lineEndY = arc.y + Math.sin(angle) * (arc.outerRadius + 30);
                                
                                ctx.save();
                                ctx.strokeStyle = '#64748b';
                                ctx.lineWidth = 1.5;
                                ctx.beginPath();
                                ctx.moveTo(lineStartX, lineStartY);
                                ctx.lineTo(lineEndX, lineEndY);
                                ctx.lineTo(x, y);
                                ctx.stroke();
                                
                                ctx.font = 'bold 10px JetBrains Mono';
                                ctx.fillStyle = '#1e293b';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                
                                ctx.fillText(`${percentage.toFixed(1)}%`, x, y - 8);
                                ctx.fillText(label, x, y + 8);
                                
                                ctx.restore();
                            }
                        });
                    }
                }]
            });
        }

        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const period = this.dataset.period;
                currentPeriod = period;
                
                const loading = document.querySelector('.loading');
                const content = document.getElementById('dashboard-content');
                
                loading.style.display = 'block';
                content.style.opacity = '0';
                
                setTimeout(() => {
                    renderDashboard(period);
                    loading.style.display = 'none';
                    content.style.opacity = '1';
                }, 300);
            });
        });
    </script>
</body>
</html>
